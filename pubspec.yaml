name: garantie_safe
description: "App zur sicheren Verwaltung und Organisation von Garantien, Belegen und Erinnerungen."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  path: ^1.9.0
  open_filex: ^4.6.0

  # === Framework & State Management ===
  flutter_riverpod: ^2.6.1

  # === Daten & Storage ===
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.4
  archive: ^3.6.1
  package_info_plus: ^8.0.0

  # === OCR, Dateien & Medien ===
  google_mlkit_text_recognition: ^0.13.1
  image_picker: ^1.2.0
  file_picker: ^8.0.0
  crop_your_image: ^1.1.0
  flutter_image_compress: ^2.4.0
  pdf: ^3.11.3
  printing: ^5.14.2

  # === Krypto, Netzwerk, API ===
  cryptography: ^2.7.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.2
  url_launcher: ^6.3.2
  share_plus: ^10.1.3

  # === Lokalisierung & Benachrichtigung ===
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  workmanager: ^0.9.0+3
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # === Sicherheit / Auth ===
  local_auth: ^2.3.0

  # === In-App Purchase ===
  in_app_purchase: ^3.2.0

  # === Icons ===
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  # === Assets (optional, später erweiterbar) ===
  # assets:
  #   - assets/images/
  #   - assets/icons/
